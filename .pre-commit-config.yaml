repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff           # линтер
      - id: ruff-format    # форматтер

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy           # проверка типов

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace   # пробелы в конце строк
      - id: end-of-file-fixer     # перевод строки в конце файла
      - id: check-yaml            # валидация YAML-файлов
